<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630" role="img" aria-label="A coin dropping into a foundation, labeled 700k dollars.">
  <defs><style>
    .serif{font-family:Georgia, 'Iowan Old Style', 'Times New Roman', serif;}
    .sans{font-family:-apple-system, 'Segoe UI', Helvetica, Arial, sans-serif;}
    .mono{font-family:'Consolas', 'Courier New', monospace;}
  </style></defs>

  <rect width="1200" height="630" fill="#FAF7F2"/>
  <rect x="14" y="14" width="1172" height="602" rx="10" fill="none" stroke="#E8DDD0" stroke-width="2"/>

  <g>
    <circle cx="966" cy="238" r="34" fill="none" stroke="#BF4B1A" stroke-width="5"/>
    <text x="966" y="250" class="serif" font-size="34" font-weight="800" fill="#BF4B1A" text-anchor="middle">$</text>
    <path d="M966 276 v44" stroke="#B5AFA9" stroke-width="4" stroke-dasharray="4 10"/>
    <path d="M948 306 l18 18 l18 -18" fill="none" stroke="#B5AFA9" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
    <rect x="856" y="340" width="220" height="30" rx="4" fill="#7B746E"/>
    <rect x="876" y="370" width="180" height="60" rx="3" fill="none" stroke="#7B746E" stroke-width="4"/>
    <g stroke="#7B746E" stroke-width="4"><line x1="916" y1="374" x2="916" y2="426"/><line x1="966" y1="374" x2="966" y2="426"/><line x1="1016" y1="374" x2="1016" y2="426"/></g>
    <text x="966" y="470" class="sans" font-size="20" font-weight="800" fill="#BF4B1A" text-anchor="middle">$700k</text>
  </g>

  <text x="84" y="150" class="sans" font-size="19" letter-spacing="4" fill="#7B746E">OPEN  SOURCE</text>

  <text x="84" y="252" class="serif" font-size="52" font-weight="800" fill="#1A1816">Paying for the tools</text>
  <text x="84" y="311" class="serif" font-size="52" font-weight="800" fill="#BF4B1A">that power everything.</text>

  <rect x="84" y="345" width="72" height="5" rx="2.5" fill="#BF4B1A"/>
  <text x="84" y="395" class="sans" font-size="21" fill="#7B746E">Mitchell Hashimoto pledged $700k to a language he</text>
  <text x="84" y="425" class="sans" font-size="21" fill="#7B746E">partly disagrees with. Who actually pays?</text>
</svg>
