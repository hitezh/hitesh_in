<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 560" width="1000" height="560" role="img" aria-label="Income is taxed slab by slab. A raise is taxed only on the new top slice, so take-home always rises.">
  <defs><style>
    .serif{font-family:Georgia,'Times New Roman',serif;}
    .sans{font-family:-apple-system,'Segoe UI',Helvetica,Arial,sans-serif;}
  </style></defs>
  <rect width="1000" height="560" fill="#FAF7F2"/>
  <rect x="10" y="10" width="980" height="540" rx="10" fill="none" stroke="#E8DDD0" stroke-width="2"/>

  <text x="500" y="60" text-anchor="middle" class="serif" font-size="32" font-weight="700" fill="#1A1816">"A higher slab will shrink my take-home"</text>
  <text x="500" y="90" text-anchor="middle" class="sans" font-size="17" fill="#7B746E">It won't. Each slab is taxed only on the income inside it (rates illustrative).</text>

  <!-- stacked income bar, built bottom-up at baseline y=500 -->
  <!-- 0%: 0-3L (h90) 410-500 ; 5%: 3-7L (h90) 320-410 ; 20%: 7-12L (h105) 215-320 ; 30%: >12L (h95) 120-215 -->
  <g>
    <rect x="330" y="410" width="170" height="90" fill="#EADfd2" stroke="#E8DDD0"/>
    <rect x="330" y="320" width="170" height="90" fill="#F0C9A8"/>
    <rect x="330" y="215" width="170" height="105" fill="#D9885A"/>
    <rect x="330" y="120" width="170" height="95" fill="#BF4B1A"/>
  </g>
  <!-- slab rate labels inside -->
  <g class="sans" font-size="20" font-weight="800" text-anchor="middle">
    <text x="415" y="463" fill="#7B746E">0%</text>
    <text x="415" y="373" fill="#7A2400">5%</text>
    <text x="415" y="275" fill="#FAF7F2">20%</text>
    <text x="415" y="175" fill="#FAF7F2">30%</text>
  </g>
  <!-- slab range labels to the left -->
  <g class="sans" font-size="14" fill="#7B746E" text-anchor="end">
    <text x="305" y="461">up to &#8377;3L</text>
    <text x="305" y="371">&#8377;3L&#8211;7L</text>
    <text x="305" y="273">&#8377;7L&#8211;12L</text>
    <text x="305" y="173">above &#8377;12L</text>
  </g>

  <!-- callout to the top slice -->
  <line x1="500" y1="160" x2="600" y2="160" stroke="#BF4B1A" stroke-width="2"/>
  <circle cx="500" cy="160" r="4" fill="#BF4B1A"/>
  <text x="612" y="150" class="sans" font-size="17" font-weight="700" fill="#1A1816">Your raise lands here.</text>
  <text x="612" y="176" class="sans" font-size="16" fill="#7B746E">Only this top slice is taxed at 30%.</text>
  <text x="612" y="198" class="sans" font-size="16" fill="#7B746E">Everything below it is unchanged.</text>

  <text x="500" y="535" text-anchor="middle" class="sans" font-size="18" fill="#1A1816">Crossing into a higher slab NEVER lowers what you keep.</text>
</svg>
