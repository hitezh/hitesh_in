<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 540" width="1000" height="540" role="img" aria-label="Net worth is a total you hold; GDP is what a country produces each year. A stock versus a flow.">
  <defs><style>
    .serif{font-family:Georgia,'Times New Roman',serif;}
    .sans{font-family:-apple-system,'Segoe UI',Helvetica,Arial,sans-serif;}
  </style></defs>
  <rect width="1000" height="540" fill="#FAF7F2"/>
  <rect x="10" y="10" width="980" height="520" rx="10" fill="none" stroke="#E8DDD0" stroke-width="2"/>

  <text x="500" y="62" text-anchor="middle" class="serif" font-size="34" font-weight="700" fill="#1A1816">Net worth is not GDP</text>
  <text x="500" y="92" text-anchor="middle" class="sans" font-size="17" fill="#7B746E">One is a total you hold. The other is a rate per year.</text>

  <line x1="500" y1="125" x2="500" y2="410" stroke="#E8DDD0" stroke-width="2"/>

  <!-- LEFT: net worth = a total (one tall bar) -->
  <text x="250" y="150" text-anchor="middle" class="sans" font-size="18" font-weight="700" fill="#BF4B1A">NET WORTH</text>
  <text x="250" y="174" text-anchor="middle" class="sans" font-size="14" fill="#7B746E">everything you own, right now</text>
  <rect x="200" y="210" width="100" height="180" rx="6" fill="#BF4B1A"/>
  <text x="250" y="300" text-anchor="middle" class="serif" font-size="30" font-weight="800" fill="#FAF7F2">&#8377;</text>
  <text x="250" y="372" text-anchor="middle" class="sans" font-size="13" fill="#FAF7F2">one big total</text>
  <text x="250" y="424" text-anchor="middle" class="sans" font-size="15" font-weight="700" fill="#1A1816">= a STOCK</text>

  <!-- RIGHT: GDP = a flow (bars per year) -->
  <text x="750" y="150" text-anchor="middle" class="sans" font-size="18" font-weight="700" fill="#2B6CB0">GDP</text>
  <text x="750" y="174" text-anchor="middle" class="sans" font-size="14" fill="#7B746E">what's produced each year</text>
  <g fill="#2B6CB0">
    <rect x="612" y="330" width="34" height="60" rx="3"/>
    <rect x="664" y="312" width="34" height="78" rx="3"/>
    <rect x="716" y="296" width="34" height="94" rx="3"/>
    <rect x="768" y="306" width="34" height="84" rx="3"/>
    <rect x="820" y="288" width="34" height="102" rx="3"/>
  </g>
  <g class="sans" font-size="11" fill="#7B746E" text-anchor="middle">
    <text x="629" y="406">yr1</text><text x="681" y="406">yr2</text><text x="733" y="406">yr3</text><text x="785" y="406">yr4</text><text x="837" y="406">yr5</text>
  </g>
  <text x="750" y="424" text-anchor="middle" class="sans" font-size="15" font-weight="700" fill="#1A1816">= a FLOW</text>

  <text x="500" y="480" text-anchor="middle" class="sans" font-size="18" fill="#1A1816">Comparing them is like comparing your bank balance to your salary.</text>
</svg>
