<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630" role="img" aria-label="Two bars: 97 percent code with AI, 33 percent govern it.">
  <defs><style>
    .serif{font-family:Georgia, 'Iowan Old Style', 'Times New Roman', serif;}
    .sans{font-family:-apple-system, 'Segoe UI', Helvetica, Arial, sans-serif;}
    .mono{font-family:'Consolas', 'Courier New', monospace;}
  </style></defs>

  <rect width="1200" height="630" fill="#FAF7F2"/>
  <rect x="14" y="14" width="1172" height="602" rx="10" fill="none" stroke="#E8DDD0" stroke-width="2"/>

  <g>
    <text x="812" y="222" class="sans" font-size="18" fill="#7B746E">code with AI</text>
    <rect x="812" y="234" width="300" height="30" rx="4" fill="#BF4B1A"/>
    <text x="1112" y="256" class="sans" font-size="20" font-weight="800" fill="#BF4B1A" text-anchor="end">97%</text>
    <text x="812" y="330" class="sans" font-size="18" fill="#7B746E">govern it</text>
    <rect x="812" y="342" width="300" height="30" rx="4" fill="none" stroke="#B5AFA9" stroke-width="2"/>
    <rect x="812" y="342" width="102" height="30" rx="4" fill="#7B746E"/>
    <text x="1112" y="364" class="sans" font-size="20" font-weight="800" fill="#7B746E" text-anchor="end">33%</text>
  </g>

  <text x="84" y="150" class="sans" font-size="19" letter-spacing="4" fill="#7B746E">AI  GOVERNANCE</text>

  <text x="84" y="252" class="serif" font-size="60" font-weight="800" fill="#1A1816">AI writes the code.</text>
  <text x="84" y="320" class="serif" font-size="60" font-weight="800" fill="#BF4B1A">Who governs it?</text>

  <rect x="84" y="354" width="72" height="5" rx="2.5" fill="#BF4B1A"/>
  <text x="84" y="404" class="sans" font-size="21" fill="#7B746E">Almost every team codes with AI. Only a third</text>
  <text x="84" y="434" class="sans" font-size="21" fill="#7B746E">reviews what it produces.</text>
</svg>
