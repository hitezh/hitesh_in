<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630" role="img" aria-label="A tiny GDP bar beside a towering 26 trillion dollar TAM bar.">
  <defs><style>
    .serif{font-family:Georgia, 'Iowan Old Style', 'Times New Roman', serif;}
    .sans{font-family:-apple-system, 'Segoe UI', Helvetica, Arial, sans-serif;}
    .mono{font-family:'Consolas', 'Courier New', monospace;}
  </style></defs>

  <rect width="1200" height="630" fill="#FAF7F2"/>
  <rect x="14" y="14" width="1172" height="602" rx="10" fill="none" stroke="#E8DDD0" stroke-width="2"/>

  <g>
    <line x1="812" y1="440" x2="1120" y2="440" stroke="#B5AFA9" stroke-width="3"/>
    <rect x="836" y="404" width="70" height="36" fill="#7B746E"/>
    <text x="871" y="466" class="sans" font-size="16" fill="#7B746E" text-anchor="middle">US GDP</text>
    <rect x="1000" y="150" width="70" height="290" fill="#BF4B1A"/>
    <path d="M1000 150 l35 -26 l35 26 z" fill="#BF4B1A"/>
    <text x="1035" y="466" class="sans" font-size="16" font-weight="800" fill="#BF4B1A" text-anchor="middle">$26T TAM</text>
  </g>

  <text x="84" y="150" class="sans" font-size="19" letter-spacing="4" fill="#7B746E">STARTUPS</text>

  <text x="84" y="252" class="serif" font-size="66" font-weight="800" fill="#1A1816">A TAM bigger</text>
  <text x="84" y="327" class="serif" font-size="66" font-weight="800" fill="#BF4B1A">than US GDP.</text>

  <rect x="84" y="361" width="72" height="5" rx="2.5" fill="#BF4B1A"/>
  <text x="84" y="411" class="sans" font-size="21" fill="#7B746E">SpaceX paid $60B for a coding tool. The $26</text>
  <text x="84" y="441" class="sans" font-size="21" fill="#7B746E">trillion market is the tell.</text>
</svg>
