<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630" role="img" aria-label="An eye framed inside a camera viewfinder with concentric gaze-tracking rings, representing a mandated driver-monitoring model.">
  <defs><style>
    .serif{font-family:Georgia, 'Iowan Old Style', 'Times New Roman', serif;}
    .sans{font-family:-apple-system, 'Segoe UI', Helvetica, Arial, sans-serif;}
  </style></defs>

  <rect width="1200" height="630" fill="#FAF7F2"/>
  <rect x="14" y="14" width="1172" height="602" rx="10" fill="none" stroke="#E8DDD0" stroke-width="2"/>

  <!-- watching-eye motif, right side -->
  <g transform="translate(962,326)">
    <!-- gaze-tracking rings -->
    <circle r="150" fill="none" stroke="#E0D3C2" stroke-width="1.5" stroke-dasharray="3 9"/>
    <circle r="112" fill="none" stroke="#E0D3C2" stroke-width="1.5"/>

    <!-- eye -->
    <path d="M-92 0 Q0 -62 92 0 Q0 62 -92 0 Z" fill="none" stroke="#7B746E" stroke-width="4"/>
    <circle r="34" fill="#BF4B1A"/>
    <circle r="12" fill="#FAF7F2"/>

    <!-- viewfinder corner brackets -->
    <g stroke="#1A1816" stroke-width="4" fill="none" stroke-linecap="round">
      <path d="M-150 -110 L-150 -150 L-110 -150"/>
      <path d="M110 -150 L150 -150 L150 -110"/>
      <path d="M150 110 L150 150 L110 150"/>
      <path d="M-110 150 L-150 150 L-150 110"/>
    </g>

    <!-- alert triangle -->
    <g transform="translate(150,-150)">
      <path d="M0 -20 L18 14 L-18 14 Z" fill="#BF4B1A"/>
      <rect x="-2.5" y="-8" width="5" height="12" rx="2" fill="#FAF7F2"/>
      <circle cx="0" cy="9" r="2.6" fill="#FAF7F2"/>
    </g>
  </g>

  <text x="84" y="150" class="sans" font-size="19" letter-spacing="4" fill="#7B746E">PRODUCT  STRATEGY</text>

  <text x="84" y="252" class="serif" font-size="60" font-weight="800" fill="#1A1816">When the regulator</text>
  <text x="84" y="322" class="serif" font-size="60" font-weight="800" fill="#BF4B1A">writes your spec.</text>

  <rect x="84" y="356" width="72" height="5" rx="2.5" fill="#BF4B1A"/>
  <text x="84" y="406" class="sans" font-size="21" fill="#7B746E">Every new car now ships an AI model no buyer</text>
  <text x="84" y="436" class="sans" font-size="21" fill="#7B746E">chose. It is a preview of mandated AI.</text>
</svg>
