<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630" role="img" aria-label="A balance scale weighing code braces against a decision.">
  <defs><style>
    .serif{font-family:Georgia, 'Iowan Old Style', 'Times New Roman', serif;}
    .sans{font-family:-apple-system, 'Segoe UI', Helvetica, Arial, sans-serif;}
    .mono{font-family:'Consolas', 'Courier New', monospace;}
  </style></defs>

  <rect width="1200" height="630" fill="#FAF7F2"/>
  <rect x="14" y="14" width="1172" height="602" rx="10" fill="none" stroke="#E8DDD0" stroke-width="2"/>

  <g stroke="#7B746E" stroke-width="4" fill="none" stroke-linecap="round">
    <line x1="966" y1="180" x2="966" y2="430"/>
    <rect x="936" y="430" width="60" height="14" rx="4" fill="#7B746E" stroke="none"/>
    <line x1="836" y1="210" x2="1096" y2="210"/>
    <line x1="836" y1="210" x2="836" y2="248"/>
    <line x1="1096" y1="210" x2="1096" y2="248"/>
    <path d="M800 248 a36 20 0 0 0 72 0" stroke="#BF4B1A"/>
    <path d="M1060 248 a36 20 0 0 0 72 0"/>
    <circle cx="966" cy="192" r="8" fill="#BF4B1A" stroke="none"/>
    <text x="836" y="300" class="mono" font-size="30" font-weight="700" fill="#BF4B1A" stroke="none" text-anchor="middle">{ }</text>
    <text x="1096" y="300" class="serif" font-size="34" font-weight="800" fill="#7B746E" stroke="none" text-anchor="middle">?</text>
  </g>

  <text x="84" y="150" class="sans" font-size="19" letter-spacing="4" fill="#7B746E">SOFTWARE  ENGINEERING</text>

  <text x="84" y="252" class="serif" font-size="66" font-weight="800" fill="#1A1816">The sovereign</text>
  <text x="84" y="327" class="serif" font-size="66" font-weight="800" fill="#BF4B1A">engineer.</text>

  <rect x="84" y="361" width="72" height="5" rx="2.5" fill="#BF4B1A"/>
  <text x="84" y="411" class="sans" font-size="21" fill="#7B746E">Working code is cheap. Judgment about what to</text>
  <text x="84" y="441" class="sans" font-size="21" fill="#7B746E">build, and whether it was worth it, is not.</text>
</svg>
