<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630" role="img" aria-label="An exam paper struck through with a large X.">
  <defs><style>
    .serif{font-family:Georgia, 'Iowan Old Style', 'Times New Roman', serif;}
    .sans{font-family:-apple-system, 'Segoe UI', Helvetica, Arial, sans-serif;}
    .mono{font-family:'Consolas', 'Courier New', monospace;}
  </style></defs>

  <rect width="1200" height="630" fill="#FAF7F2"/>
  <rect x="14" y="14" width="1172" height="602" rx="10" fill="none" stroke="#E8DDD0" stroke-width="2"/>

  <g>
    <rect x="846" y="188" width="210" height="264" rx="6" fill="none" stroke="#7B746E" stroke-width="4"/>
    <g stroke="#B5AFA9" stroke-width="4" stroke-linecap="round">
      <line x1="878" y1="232" x2="1024" y2="232"/><line x1="878" y1="268" x2="1024" y2="268"/>
      <line x1="878" y1="304" x2="1024" y2="304"/><line x1="878" y1="340" x2="1024" y2="340"/>
      <line x1="878" y1="376" x2="978" y2="376"/>
    </g>
    <g stroke="#BF4B1A" stroke-width="12" stroke-linecap="round">
      <line x1="906" y1="250" x2="1030" y2="392"/><line x1="1030" y1="250" x2="906" y2="392"/>
    </g>
  </g>

  <text x="84" y="150" class="sans" font-size="19" letter-spacing="4" fill="#7B746E">AI  +  EDUCATION</text>

  <text x="84" y="252" class="serif" font-size="66" font-weight="800" fill="#1A1816">The take-home</text>
  <text x="84" y="327" class="serif" font-size="66" font-weight="800" fill="#BF4B1A">exam is over.</text>

  <rect x="84" y="361" width="72" height="5" rx="2.5" fill="#BF4B1A"/>
  <text x="84" y="411" class="sans" font-size="21" fill="#7B746E">The outrage landed on the students. The design</text>
  <text x="84" y="441" class="sans" font-size="21" fill="#7B746E">problem deserves more attention.</text>
</svg>
