<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630" role="img" aria-label="Code braces surrounding a large question mark.">
  <defs><style>
    .serif{font-family:Georgia, 'Iowan Old Style', 'Times New Roman', serif;}
    .sans{font-family:-apple-system, 'Segoe UI', Helvetica, Arial, sans-serif;}
    .mono{font-family:'Consolas', 'Courier New', monospace;}
  </style></defs>

  <rect width="1200" height="630" fill="#FAF7F2"/>
  <rect x="14" y="14" width="1172" height="602" rx="10" fill="none" stroke="#E8DDD0" stroke-width="2"/>

  <g>
    <text x="820" y="380" class="mono" font-size="200" fill="#7B746E">{</text>
    <text x="1096" y="380" class="mono" font-size="200" fill="#7B746E" text-anchor="end">}</text>
    <text x="966" y="372" class="serif" font-size="120" font-weight="800" fill="#BF4B1A" text-anchor="middle">?</text>
  </g>

  <text x="84" y="150" class="sans" font-size="19" letter-spacing="4" fill="#7B746E">SOFTWARE  ENGINEERING</text>

  <text x="84" y="252" class="serif" font-size="66" font-weight="800" fill="#1A1816">The code you</text>
  <text x="84" y="327" class="serif" font-size="66" font-weight="800" fill="#BF4B1A">can't explain.</text>

  <rect x="84" y="361" width="72" height="5" rx="2.5" fill="#BF4B1A"/>
  <text x="84" y="411" class="sans" font-size="21" fill="#7B746E">AI made code cheap to generate. Knowing what to</text>
  <text x="84" y="441" class="sans" font-size="21" fill="#7B746E">build, and owning it, is still yours.</text>
</svg>
