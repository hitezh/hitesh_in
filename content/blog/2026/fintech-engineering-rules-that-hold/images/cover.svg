<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630" role="img" aria-label="Three standing pillars, one highlighted.">
  <defs><style>
    .serif{font-family:Georgia, 'Iowan Old Style', 'Times New Roman', serif;}
    .sans{font-family:-apple-system, 'Segoe UI', Helvetica, Arial, sans-serif;}
    .mono{font-family:'Consolas', 'Courier New', monospace;}
  </style></defs>

  <rect width="1200" height="630" fill="#FAF7F2"/>
  <rect x="14" y="14" width="1172" height="602" rx="10" fill="none" stroke="#E8DDD0" stroke-width="2"/>

  <g>
    <rect x="836" y="238" width="14" height="176" fill="#7B746E"/><rect x="816" y="212" width="54" height="14" rx="3" fill="#7B746E"/><circle cx="843" cy="205" r="7" fill="#7B746E"/><rect x="946" y="238" width="14" height="176" fill="#BF4B1A"/><rect x="926" y="212" width="54" height="14" rx="3" fill="#BF4B1A"/><circle cx="953" cy="205" r="7" fill="#BF4B1A"/><rect x="1056" y="238" width="14" height="176" fill="#7B746E"/><rect x="1036" y="212" width="54" height="14" rx="3" fill="#7B746E"/><circle cx="1063" cy="205" r="7" fill="#7B746E"/>
    <rect x="800" y="414" width="332" height="16" rx="4" fill="#B5AFA9"/>
  </g>

  <text x="84" y="150" class="sans" font-size="19" letter-spacing="4" fill="#7B746E">FINTECH</text>

  <text x="84" y="252" class="serif" font-size="60" font-weight="800" fill="#1A1816">The fintech rules</text>
  <text x="84" y="320" class="serif" font-size="60" font-weight="800" fill="#BF4B1A">that actually hold.</text>

  <rect x="84" y="354" width="72" height="5" rx="2.5" fill="#BF4B1A"/>
  <text x="84" y="404" class="sans" font-size="21" fill="#7B746E">Three principles survive every context.</text>
  <text x="84" y="434" class="sans" font-size="21" fill="#7B746E">Organizations still break them anyway.</text>
</svg>
