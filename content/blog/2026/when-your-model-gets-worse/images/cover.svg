<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630" role="img" aria-label="A reasoning bar cut off at a fixed line while a status indicator reads all systems normal.">
  <defs><style>
    .serif{font-family:Georgia, 'Iowan Old Style', 'Times New Roman', serif;}
    .sans{font-family:-apple-system, 'Segoe UI', Helvetica, Arial, sans-serif;}
    .mono{font-family:'Consolas', 'Courier New', monospace;}
  </style></defs>

  <rect width="1200" height="630" fill="#FAF7F2"/>
  <rect x="14" y="14" width="1172" height="602" rx="10" fill="none" stroke="#E8DDD0" stroke-width="2"/>

  <!-- left: reasoning as stacked lines, truncated at a hard cut line -->
  <g transform="translate(96,150)">
    <text x="0" y="-28" class="mono" font-size="20" fill="#B5AFA9" letter-spacing="1">reasoning</text>
    <!-- full-length lines -->
    <rect x="0" y="0"   width="360" height="12" rx="6" fill="#B5AFA9"/>
    <rect x="0" y="34"  width="410" height="12" rx="6" fill="#B5AFA9"/>
    <rect x="0" y="68"  width="330" height="12" rx="6" fill="#B5AFA9"/>
    <!-- the hard cut -->
    <rect x="0" y="102" width="150" height="12" rx="6" fill="#7B746E"/>
    <!-- ghost of what would have been -->
    <rect x="160" y="102" width="250" height="12" rx="6" fill="none" stroke="#E0D6C8" stroke-width="2" stroke-dasharray="3 7"/>
    <rect x="0" y="136" width="0" height="12" rx="6"/>
    <line x1="150" y1="-8" x2="150" y2="150" stroke="#BF4B1A" stroke-width="3" stroke-dasharray="7 6"/>
    <text x="150" y="182" text-anchor="middle" class="mono" font-size="20" fill="#BF4B1A">516</text>
  </g>

  <!-- right: green status, everything reads fine -->
  <g transform="translate(852,168)">
    <circle cx="0" cy="0" r="16" fill="none" stroke="#5E7B57" stroke-width="4"/><path d="M-8 0 l6 7 l12 -14" fill="none" stroke="#5E7B57" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="34" y="7" class="sans" font-size="22" fill="#7B746E">tests passing</text>
    <circle cx="0" cy="54" r="16" fill="none" stroke="#5E7B57" stroke-width="4"/><path d="M-8 54 l6 7 l12 -14" fill="none" stroke="#5E7B57" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="34" y="61" class="sans" font-size="22" fill="#7B746E">latency normal</text>
    <circle cx="0" cy="108" r="16" fill="none" stroke="#5E7B57" stroke-width="4"/><path d="M-8 108 l6 7 l12 -14" fill="none" stroke="#5E7B57" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="34" y="115" class="sans" font-size="22" fill="#7B746E">error rate flat</text>
  </g>

  <!-- title -->
  <text x="96" y="446" class="serif" font-size="58" fill="#2E2A26">When your model gets worse</text>
  <text x="96" y="512" class="serif" font-size="58" fill="#2E2A26">and nothing breaks</text>
  <text x="98" y="566" class="sans" font-size="24" fill="#8A8078">The dependency you can't pin, and can't see change</text>
</svg>
