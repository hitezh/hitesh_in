<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630" role="img" aria-label="A single chat answer bubble stands where a search page used to show many results. Below the answer sits a small tinted box marked SPONSORED, and an arrow shows money flowing from an advertiser into that box, illustrating that the assistant now has a paying customer sitting inside its one answer.">
  <defs>
    <style>
      .serif{font-family:Georgia, 'Iowan Old Style', 'Times New Roman', serif;}
      .sans{font-family:-apple-system, 'Segoe UI', Helvetica, Arial, sans-serif;}
    </style>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#BF4B1A"/>
    </marker>
  </defs>

  <rect width="1200" height="630" fill="#FAF7F2"/>
  <rect x="14" y="14" width="1172" height="602" rx="10" fill="none" stroke="#E8DDD0" stroke-width="2"/>

  <!-- right-side visual: one answer, with a sponsor sitting inside it -->
  <g class="sans">
    <text x="940" y="150" font-size="13" letter-spacing="3" fill="#A99E92" text-anchor="middle">ONE ANSWER. TWO CUSTOMERS.</text>

    <!-- the single answer bubble -->
    <rect x="712" y="180" width="456" height="150" rx="12" fill="#1A1816"/>
    <text x="740" y="222" font-size="14" letter-spacing="2" fill="#C9BEB0">THE ANSWER</text>
    <rect x="740" y="240" width="360" height="10" rx="5" fill="#4A453F"/>
    <rect x="740" y="262" width="400" height="10" rx="5" fill="#4A453F"/>
    <rect x="740" y="284" width="300" height="10" rx="5" fill="#4A453F"/>

    <!-- the sponsored box sitting under the answer, same channel -->
    <rect x="712" y="346" width="456" height="70" rx="10" fill="#F6E7DE" stroke="#BF4B1A" stroke-width="2"/>
    <rect x="732" y="368" width="86" height="26" rx="6" fill="#BF4B1A"/>
    <text x="775" y="386" font-size="13" font-weight="800" fill="#FAF7F2" text-anchor="middle">SPONSORED</text>
    <rect x="836" y="376" width="300" height="10" rx="5" fill="#D9A98F"/>

    <!-- advertiser paying into the channel -->
    <rect x="826" y="470" width="228" height="60" rx="8" fill="#FAF7F2" stroke="#A99E92" stroke-width="2"/>
    <text x="940" y="507" font-size="16" font-weight="700" fill="#7B746E" text-anchor="middle">THE ADVERTISER PAYS</text>
    <line x1="940" y1="470" x2="940" y2="424" stroke="#BF4B1A" stroke-width="3" marker-end="url(#arrow)"/>
  </g>

  <text x="84" y="150" class="sans" font-size="19" letter-spacing="4" fill="#7B746E">AI  BUSINESS  MODELS</text>

  <text x="84" y="256" class="serif" font-size="54" font-weight="800" fill="#1A1816">ChatGPT's new</text>
  <text x="84" y="322" class="serif" font-size="54" font-weight="800" fill="#1A1816">customer</text>
  <text x="84" y="388" class="serif" font-size="54" font-weight="800" fill="#BF4B1A">isn't you.</text>

  <rect x="84" y="420" width="72" height="5" rx="2.5" fill="#BF4B1A"/>
  <text x="84" y="470" class="sans" font-size="21" fill="#7B746E">Ads move the incentive from the user who</text>
  <text x="84" y="500" class="sans" font-size="21" fill="#7B746E">asks to the advertiser who pays.</text>
</svg>
