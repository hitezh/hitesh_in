<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630" role="img" aria-label="A toll gate arm and a payment-required booth across a road.">
  <defs><style>
    .serif{font-family:Georgia, 'Iowan Old Style', 'Times New Roman', serif;}
    .sans{font-family:-apple-system, 'Segoe UI', Helvetica, Arial, sans-serif;}
    .mono{font-family:'Consolas', 'Courier New', monospace;}
  </style></defs>

  <rect width="1200" height="630" fill="#FAF7F2"/>
  <rect x="14" y="14" width="1172" height="602" rx="10" fill="none" stroke="#E8DDD0" stroke-width="2"/>

  <g>
    <line x1="812" y1="452" x2="1120" y2="452" stroke="#B5AFA9" stroke-width="3"/>
    <line x1="828" y1="452" x2="900" y2="452" stroke="#B5AFA9" stroke-width="3" stroke-dasharray="10 14"/>
    <rect x="1024" y="300" width="72" height="152" rx="6" fill="none" stroke="#7B746E" stroke-width="4"/>
    <rect x="1024" y="300" width="72" height="34" rx="6" fill="#7B746E"/>
    <text x="1060" y="325" class="sans" font-size="17" font-weight="700" fill="#FAF7F2" text-anchor="middle">402</text>
    <rect x="1036" y="352" width="48" height="30" rx="3" fill="none" stroke="#7B746E" stroke-width="2.5"/>
    <circle cx="812" cy="360" r="20" fill="#BF4B1A"/>
    <line x1="835" y1="360" x2="1022" y2="360" stroke="#BF4B1A" stroke-width="6" stroke-linecap="round"/>
    <line x1="835" y1="360" x2="835" y2="452" stroke="#BF4B1A" stroke-width="6"/>
    <text x="812" y="366" class="sans" font-size="20" font-weight="800" fill="#FAF7F2" text-anchor="middle">$</text>
  </g>

  <text x="84" y="150" class="sans" font-size="19" letter-spacing="4" fill="#7B746E">AI  +  PAYMENTS</text>

  <text x="84" y="252" class="serif" font-size="66" font-weight="800" fill="#1A1816">The AI web got</text>
  <text x="84" y="327" class="serif" font-size="66" font-weight="800" fill="#BF4B1A">a toll booth.</text>

  <rect x="84" y="361" width="72" height="5" rx="2.5" fill="#BF4B1A"/>
  <text x="84" y="411" class="sans" font-size="21" fill="#7B746E">Cloudflare can charge agents per request. The</text>
  <text x="84" y="441" class="sans" font-size="21" fill="#7B746E">question is who ends up owning the meter.</text>
</svg>
