<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630" role="img" aria-label="Rising signal bars beside a flat, absent one.">
  <defs><style>
    .serif{font-family:Georgia, 'Iowan Old Style', 'Times New Roman', serif;}
    .sans{font-family:-apple-system, 'Segoe UI', Helvetica, Arial, sans-serif;}
    .mono{font-family:'Consolas', 'Courier New', monospace;}
  </style></defs>

  <rect width="1200" height="630" fill="#FAF7F2"/>
  <rect x="14" y="14" width="1172" height="602" rx="10" fill="none" stroke="#E8DDD0" stroke-width="2"/>

  <g>
    <rect x="836" y="390" width="26" height="40" rx="4" fill="#BF4B1A"/><rect x="882" y="356" width="26" height="74" rx="4" fill="#BF4B1A"/><rect x="928" y="320" width="26" height="110" rx="4" fill="#BF4B1A"/><rect x="974" y="280" width="26" height="150" rx="4" fill="#BF4B1A"/><rect x="1020" y="410" width="26" height="20" rx="4" fill="none" stroke="#B5AFA9" stroke-width="3" stroke-dasharray="3 7"/>
    <line x1="820" y1="430" x2="1058" y2="430" stroke="#B5AFA9" stroke-width="3"/>
  </g>

  <text x="84" y="150" class="sans" font-size="19" letter-spacing="4" fill="#7B746E">TEAMS</text>

  <text x="84" y="252" class="serif" font-size="66" font-weight="800" fill="#1A1816">The effort</text>
  <text x="84" y="327" class="serif" font-size="66" font-weight="800" fill="#BF4B1A">signal.</text>

  <rect x="84" y="361" width="72" height="5" rx="2.5" fill="#BF4B1A"/>
  <text x="84" y="411" class="sans" font-size="21" fill="#7B746E">Effort never signaled value. It signaled skin in</text>
  <text x="84" y="441" class="sans" font-size="21" fill="#7B746E">the game, and AI broke that mechanism.</text>
</svg>
