  </style></defs>

  <rect width="1200" height="630" fill="#FAF7F2"/>
  <rect x="14" y="14" width="1172" height="602" rx="10" fill="none" stroke="#E8DDD0" stroke-width="2"/>

  <g>
    <circle cx="852" cy="214" r="16" fill="none" stroke="#7B746E" stroke-width="4"/><path d="M844 214 l6 7 l12 -14" fill="none" stroke="#7B746E" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/><rect x="884" y="208" width="150" height="12" rx="6" fill="#B5AFA9"/><circle cx="852" cy="268" r="16" fill="none" stroke="#7B746E" stroke-width="4"/><path d="M844 268 l6 7 l12 -14" fill="none" stroke="#7B746E" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/><rect x="884" y="262" width="150" height="12" rx="6" fill="#B5AFA9"/><circle cx="852" cy="322" r="16" fill="none" stroke="#7B746E" stroke-width="4"/><path d="M844 322 l6 7 l12 -14" fill="none" stroke="#7B746E" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/><rect x="884" y="316" width="150" height="12" rx="6" fill="#B5AFA9"/>
    <path d="M852 384 l22 44 l-44 0 z" fill="none" stroke="#BF4B1A" stroke-width="4" stroke-linejoin="round"/>
    <line x1="852" y1="398" x2="852" y2="412" stroke="#BF4B1A" stroke-width="4" stroke-linecap="round"/>
