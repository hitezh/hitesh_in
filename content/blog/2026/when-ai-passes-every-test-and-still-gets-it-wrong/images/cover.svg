  </g>

  <text x="84" y="150" class="sans" font-size="19" letter-spacing="4" fill="#7B746E">SOFTWARE  ENGINEERING</text>

  <text x="84" y="252" class="serif" font-size="60" font-weight="800" fill="#1A1816">Passes every test.</text>
  <text x="84" y="320" class="serif" font-size="60" font-weight="800" fill="#BF4B1A">Still wrong.</text>

  <rect x="84" y="354" width="72" height="5" rx="2.5" fill="#BF4B1A"/>
  <text x="84" y="404" class="sans" font-size="21" fill="#7B746E">The new failure compiles and passes the tests.</text>
  <text x="84" y="434" class="sans" font-size="21" fill="#7B746E">Our review was built for the old kind of mistake.</text>
</svg>
