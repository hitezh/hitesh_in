<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630" role="img" aria-label="An editorial diagram: an agent's chance of finishing a task correctly falls as a compounding curve with each additional step of autonomy. A dashed line marks the reliability you can ship; where the curve drops below it is your autonomy budget.">
  <defs>
    <style>
      .serif { font-family: Georgia, 'Iowan Old Style', 'Times New Roman', serif; }
      .sans  { font-family: -apple-system, 'Segoe UI', Helvetica, Arial, sans-serif; }
    </style>
  </defs>

  <!-- card -->
  <rect x="0" y="0" width="1200" height="630" fill="#FAF7F2"/>
  <rect x="14" y="14" width="1172" height="602" rx="10" fill="none" stroke="#E8DDD0" stroke-width="2"/>

  <!-- left: text block -->
  <text x="92" y="170" class="sans" font-size="19" letter-spacing="4" fill="#7B746E">ON&#160;&#160;AGENTIC&#160;&#160;AI</text>

  <text x="88" y="280" class="serif" font-size="82" fill="#1A1816">The autonomy</text>
  <text x="88" y="364" class="serif" font-size="82" fill="#1A1816">budget<tspan fill="#BF4B1A">.</tspan></text>

  <rect x="92" y="398" width="68" height="5" rx="2.5" fill="#BF4B1A"/>

  <text x="92" y="452" class="sans" font-size="22" fill="#7B746E">Agents don&#8217;t fail linearly. Each step you</text>
  <text x="92" y="484" class="sans" font-size="22" fill="#7B746E">delegate multiplies the odds of a wrong turn.</text>

  <!-- right: chart -->
  <!-- axes -->
  <line x1="700" y1="150" x2="700" y2="470" stroke="#E8DDD0" stroke-width="2"/>
  <line x1="700" y1="470" x2="1140" y2="470" stroke="#E8DDD0" stroke-width="2"/>
  <text x="700" y="498" class="sans" font-size="15" fill="#B5AFA9">1 step</text>
  <text x="1140" y="498" class="sans" font-size="15" fill="#B5AFA9" text-anchor="end">many steps</text>

  <!-- threshold: reliability you can ship -->
  <line x1="700" y1="322" x2="1140" y2="322" stroke="#7B746E" stroke-width="2" stroke-dasharray="2 9"/>
  <text x="1136" y="312" class="sans" font-size="16" fill="#7B746E" text-anchor="end">reliability you can ship</text>

  <!-- compounding decay curve: success = r^n -->
  <path d="M720,178 C 800,300 880,388 1120,438" fill="none" stroke="#BF4B1A" stroke-width="4.5" stroke-linecap="round"/>
  <text x="726" y="168" class="sans" font-size="20" fill="#BF4B1A">success = r&#8319;</text>

  <!-- crossing marker: the budget -->
  <circle cx="812" cy="322" r="7.5" fill="#BF4B1A" stroke="#FAF7F2" stroke-width="3"/>
  <line x1="812" y1="329" x2="812" y2="470" stroke="#B5AFA9" stroke-width="1.5" stroke-dasharray="3 4"/>
  <text x="812" y="360" class="sans" font-size="17" fill="#1A1816" text-anchor="middle">your budget</text>
</svg>
