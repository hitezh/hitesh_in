<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630" role="img" aria-label="Two timeline bars: a short bar marked chip life, about two years, above a long bar marked six-year financing, with the gap between them shaded to show the debt outliving the asset.">
  <defs>
    <style>
      .serif{font-family:Georgia, 'Iowan Old Style', 'Times New Roman', serif;}
      .sans{font-family:-apple-system, 'Segoe UI', Helvetica, Arial, sans-serif;}
    </style>
    <pattern id="hatch" width="10" height="10" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="10" stroke="#BF4B1A" stroke-width="2" opacity="0.28"/>
    </pattern>
  </defs>

  <rect width="1200" height="630" fill="#FAF7F2"/>
  <rect x="14" y="14" width="1172" height="602" rx="10" fill="none" stroke="#E8DDD0" stroke-width="2"/>

  <!-- right-side visual: two timelines of different length -->
  <g class="sans">
    <!-- the gap band: from year 2 to year 6 -->
    <rect x="840" y="238" width="240" height="212" fill="url(#hatch)"/>
    <line x1="840" y1="228" x2="840" y2="460" stroke="#BF4B1A" stroke-width="2" stroke-dasharray="4 5"/>
    <text x="960" y="298" font-size="16" font-weight="700" fill="#BF4B1A" text-anchor="middle">the gap</text>
    <text x="960" y="320" font-size="13" fill="#7B746E" text-anchor="middle">debt outlives</text>
    <text x="960" y="337" font-size="13" fill="#7B746E" text-anchor="middle">the chip</text>

    <!-- chip life bar (~2 years) -->
    <text x="720" y="360" font-size="14" letter-spacing="1" fill="#7B746E">CHIP LIFE</text>
    <rect x="720" y="368" width="120" height="46" rx="6" fill="#BF4B1A"/>
    <text x="780" y="397" font-size="16" font-weight="800" fill="#FAF7F2" text-anchor="middle">~2 yrs</text>

    <!-- financing bar (6 years) -->
    <text x="720" y="432" font-size="14" letter-spacing="1" fill="#7B746E">SIX-YEAR FINANCING</text>
    <rect x="720" y="440" width="360" height="46" rx="6" fill="#1A1816"/>
    <text x="900" y="469" font-size="16" font-weight="800" fill="#FAF7F2" text-anchor="middle">6 yrs</text>

    <!-- year axis -->
    <line x1="720" y1="506" x2="1080" y2="506" stroke="#E0D3C2" stroke-width="2"/>
    <g fill="#7B746E" font-size="13" text-anchor="middle">
      <text x="720" y="528">0</text>
      <text x="840" y="528">2</text>
      <text x="960" y="528">4</text>
      <text x="1080" y="528">6</text>
    </g>
    <text x="900" y="552" font-size="12" letter-spacing="2" fill="#A99E92" text-anchor="middle">YEARS</text>
  </g>

  <text x="84" y="150" class="sans" font-size="19" letter-spacing="4" fill="#7B746E">AI  STRATEGY</text>

  <text x="84" y="258" class="serif" font-size="54" font-weight="800" fill="#1A1816">A two-year asset,</text>
  <text x="84" y="324" class="serif" font-size="54" font-weight="800" fill="#1A1816">six-year money.</text>
  <text x="84" y="390" class="serif" font-size="54" font-weight="800" fill="#BF4B1A">Mind the gap.</text>

  <rect x="84" y="424" width="72" height="5" rx="2.5" fill="#BF4B1A"/>
  <text x="84" y="474" class="sans" font-size="21" fill="#7B746E">The chips obsolete in two years. The debt that</text>
  <text x="84" y="504" class="sans" font-size="21" fill="#7B746E">bought them lasts six. You pay the difference.</text>
</svg>
