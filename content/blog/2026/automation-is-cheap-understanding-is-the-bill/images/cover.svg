<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630" role="img" aria-label="An editorial diagram: as work is automated, the line for output rises cheaply while the line for human understanding falls. The widening wedge between them, after they cross, is labelled the bill you don't see.">
  <defs>
    <style>
      .serif { font-family: Georgia, 'Iowan Old Style', 'Times New Roman', serif; }
      .sans  { font-family: -apple-system, 'Segoe UI', Helvetica, Arial, sans-serif; }
    </style>
  </defs>

  <!-- card -->
  <rect x="0" y="0" width="1200" height="630" fill="#FAF7F2"/>
  <rect x="14" y="14" width="1172" height="602" rx="10" fill="none" stroke="#E8DDD0" stroke-width="2"/>

  <!-- left: text block -->
  <text x="92" y="150" class="sans" font-size="19" letter-spacing="4" fill="#7B746E">ON&#160;&#160;AI&#160;&#160;STRATEGY</text>

  <text x="88" y="262" class="serif" font-size="76" fill="#1A1816">Automation</text>
  <text x="88" y="342" class="serif" font-size="76" fill="#1A1816">is cheap<tspan fill="#BF4B1A">.</tspan></text>

  <rect x="92" y="376" width="68" height="5" rx="2.5" fill="#BF4B1A"/>

  <text x="92" y="432" class="sans" font-size="22" fill="#7B746E">You buy the output at once. You pay for</text>
  <text x="92" y="464" class="sans" font-size="22" fill="#7B746E">the lost understanding much later.</text>

  <!-- right: chart -->
  <!-- axes -->
  <line x1="712" y1="150" x2="712" y2="470" stroke="#E8DDD0" stroke-width="2"/>
  <line x1="712" y1="470" x2="1140" y2="470" stroke="#E8DDD0" stroke-width="2"/>
  <text x="712" y="498" class="sans" font-size="15" fill="#B5AFA9">less automated</text>
  <text x="1140" y="498" class="sans" font-size="15" fill="#B5AFA9" text-anchor="end">more automated</text>

  <!-- the gap wedge, right of the crossing -->
  <path d="M924,310 L1120,196 L1120,424 Z" fill="#BF4B1A" fill-opacity="0.10"/>

  <!-- output line: rises -->
  <line x1="724" y1="424" x2="1120" y2="196" stroke="#BF4B1A" stroke-width="4.5" stroke-linecap="round"/>
  <text x="1120" y="184" class="sans" font-size="18" fill="#BF4B1A" text-anchor="end">output</text>

  <!-- understanding line: falls -->
  <line x1="724" y1="196" x2="1120" y2="424" stroke="#7B746E" stroke-width="4.5" stroke-linecap="round"/>
  <text x="1120" y="446" class="sans" font-size="18" fill="#7B746E" text-anchor="end">understanding</text>

  <!-- crossing marker -->
  <circle cx="924" cy="310" r="7" fill="#1A1816" stroke="#FAF7F2" stroke-width="3"/>

  <!-- gap label -->
  <text x="1046" y="304" class="sans" font-size="17" fill="#1A1816" text-anchor="middle">the bill</text>
  <text x="1046" y="326" class="sans" font-size="17" fill="#1A1816" text-anchor="middle">you don&#8217;t see</text>
</svg>
