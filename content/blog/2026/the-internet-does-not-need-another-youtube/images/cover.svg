<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630" role="img" aria-label="A play button linked to a spread of small network nodes.">
  <defs><style>
    .serif{font-family:Georgia, 'Iowan Old Style', 'Times New Roman', serif;}
    .sans{font-family:-apple-system, 'Segoe UI', Helvetica, Arial, sans-serif;}
    .mono{font-family:'Consolas', 'Courier New', monospace;}
  </style></defs>

  <rect width="1200" height="630" fill="#FAF7F2"/>
  <rect x="14" y="14" width="1172" height="602" rx="10" fill="none" stroke="#E8DDD0" stroke-width="2"/>

  <g>
    <line x1="966" y1="308" x2="1078" y2="210" stroke="#B5AFA9" stroke-width="2"/><line x1="966" y1="308" x2="1108" y2="300" stroke="#B5AFA9" stroke-width="2"/><line x1="966" y1="308" x2="1070" y2="386" stroke="#B5AFA9" stroke-width="2"/><line x1="966" y1="308" x2="830" y2="214" stroke="#B5AFA9" stroke-width="2"/><line x1="966" y1="308" x2="812" y2="320" stroke="#B5AFA9" stroke-width="2"/><line x1="966" y1="308" x2="846" y2="404" stroke="#B5AFA9" stroke-width="2"/>
    <circle cx="966" cy="308" r="66" fill="none" stroke="#BF4B1A" stroke-width="5"/>
    <path d="M946 276 l44 32 l-44 32 z" fill="#BF4B1A"/>
    <circle cx="1078" cy="210" r="9" fill="#7B746E"/><circle cx="1108" cy="300" r="9" fill="#7B746E"/><circle cx="1070" cy="386" r="9" fill="#7B746E"/><circle cx="830" cy="214" r="9" fill="#7B746E"/><circle cx="812" cy="320" r="9" fill="#7B746E"/><circle cx="846" cy="404" r="9" fill="#7B746E"/>
  </g>

  <text x="84" y="150" class="sans" font-size="19" letter-spacing="4" fill="#7B746E">CREATOR  ECONOMY</text>

  <text x="84" y="252" class="serif" font-size="52" font-weight="800" fill="#1A1816">The internet doesn't</text>
  <text x="84" y="311" class="serif" font-size="52" font-weight="800" fill="#BF4B1A">need a second YouTube.</text>

  <rect x="84" y="345" width="72" height="5" rx="2.5" fill="#BF4B1A"/>
  <text x="84" y="395" class="sans" font-size="21" fill="#7B746E">One company shouldn't get to define what a</text>
  <text x="84" y="425" class="sans" font-size="21" fill="#7B746E">successful video platform even looks like.</text>
</svg>
