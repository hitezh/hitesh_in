<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630" role="img" aria-label="An intact padlock inside a prohibition circle.">
  <defs><style>
    .serif{font-family:Georgia, 'Iowan Old Style', 'Times New Roman', serif;}
    .sans{font-family:-apple-system, 'Segoe UI', Helvetica, Arial, sans-serif;}
    .mono{font-family:'Consolas', 'Courier New', monospace;}
  </style></defs>

  <rect width="1200" height="630" fill="#FAF7F2"/>
  <rect x="14" y="14" width="1172" height="602" rx="10" fill="none" stroke="#E8DDD0" stroke-width="2"/>

  <g>
    <path d="M916 300 v-26 a50 50 0 0 1 100 0 v26" fill="none" stroke="#7B746E" stroke-width="10" stroke-linecap="round"/>
    <rect x="888" y="300" width="156" height="120" rx="12" fill="none" stroke="#7B746E" stroke-width="6"/>
    <circle cx="966" cy="352" r="12" fill="#7B746E"/>
    <rect x="960" y="360" width="12" height="34" rx="4" fill="#7B746E"/>
    <g transform="rotate(-14 966 360)">
      <circle cx="966" cy="360" r="98" fill="none" stroke="#BF4B1A" stroke-width="8" opacity="0.55"/>
      <line x1="898" y1="292" x2="1034" y2="428" stroke="#BF4B1A" stroke-width="8" opacity="0.55"/>
    </g>
  </g>

  <text x="84" y="150" class="sans" font-size="19" letter-spacing="4" fill="#7B746E">AI  REGULATION</text>

  <text x="84" y="252" class="serif" font-size="66" font-weight="800" fill="#1A1816">The jailbreak</text>
  <text x="84" y="327" class="serif" font-size="66" font-weight="800" fill="#BF4B1A">that wasn't.</text>

  <rect x="84" y="361" width="72" height="5" rx="2.5" fill="#BF4B1A"/>
  <text x="84" y="411" class="sans" font-size="21" fill="#7B746E">A model was banned for reading a codebase and</text>
  <text x="84" y="441" class="sans" font-size="21" fill="#7B746E">fixing bugs. The labs wrote that script themselves.</text>
