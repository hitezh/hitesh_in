<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630" role="img" aria-label="A stack diagram: a faded commoditized model layer at the bottom, with the moat sitting in the layers above it.">
  <defs><style>
    .serif{font-family:Georgia, 'Iowan Old Style', 'Times New Roman', serif;}
    .sans{font-family:-apple-system, 'Segoe UI', Helvetica, Arial, sans-serif;}
  </style></defs>

  <rect width="1200" height="630" fill="#FAF7F2"/>
  <rect x="14" y="14" width="1172" height="602" rx="10" fill="none" stroke="#E8DDD0" stroke-width="2"/>

  <!-- value-moves-up stack, right side -->
  <g>
    <rect x="812" y="150" width="300" height="66" rx="8" fill="#BF4B1A"/>
    <text x="962" y="191" class="sans" font-size="24" font-weight="800" fill="#FAF7F2" text-anchor="middle">MOAT</text>

    <rect x="812" y="238" width="300" height="66" rx="8" fill="#EADFD1" stroke="#E0D3C2" stroke-width="1.5"/>
    <text x="962" y="279" class="sans" font-size="21" font-weight="700" fill="#5C554F" text-anchor="middle">WORKFLOW / DATA</text>

    <rect x="812" y="326" width="300" height="66" rx="8" fill="#EADFD1" stroke="#E0D3C2" stroke-width="1.5"/>
    <text x="962" y="367" class="sans" font-size="21" font-weight="700" fill="#5C554F" text-anchor="middle">EVALS / TRUST</text>

    <rect x="812" y="414" width="300" height="66" rx="8" fill="none" stroke="#C9BEB0" stroke-width="2" stroke-dasharray="6 6"/>
    <text x="962" y="450" class="sans" font-size="21" font-weight="700" fill="#A79E95" text-anchor="middle">MODEL</text>
    <text x="962" y="470" class="sans" font-size="12.5" letter-spacing="1" fill="#B7AEA4" text-anchor="middle">COMMODITIZED</text>

    <!-- upward arrow: value moving up the stack -->
    <g stroke="#BF4B1A" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <line x1="770" y1="452" x2="770" y2="186"/>
      <path d="M756 208 L770 182 L784 208"/>
    </g>
  </g>

  <text x="84" y="150" class="sans" font-size="19" letter-spacing="4" fill="#7B746E">AI  STRATEGY</text>

  <text x="84" y="256" class="serif" font-size="58" font-weight="800" fill="#1A1816">Your model was</text>
  <text x="84" y="322" class="serif" font-size="58" font-weight="800" fill="#BF4B1A">never your moat.</text>

  <rect x="84" y="356" width="72" height="5" rx="2.5" fill="#BF4B1A"/>
  <text x="84" y="406" class="sans" font-size="21" fill="#7B746E">When intelligence gets cheap, advantage moves</text>
  <text x="84" y="436" class="sans" font-size="21" fill="#7B746E">up the stack. Build where value stays scarce.</text>
</svg>
