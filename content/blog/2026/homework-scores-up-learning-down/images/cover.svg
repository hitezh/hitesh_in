<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630" role="img" aria-label="Two arrows from one point: scores rising, learning falling.">
  <defs><style>
    .serif{font-family:Georgia, 'Iowan Old Style', 'Times New Roman', serif;}
    .sans{font-family:-apple-system, 'Segoe UI', Helvetica, Arial, sans-serif;}
    .mono{font-family:'Consolas', 'Courier New', monospace;}
  </style></defs>

  <rect width="1200" height="630" fill="#FAF7F2"/>
  <rect x="14" y="14" width="1172" height="602" rx="10" fill="none" stroke="#E8DDD0" stroke-width="2"/>

  <g>
    <path d="M812 320 L1090 210" fill="none" stroke="#BF4B1A" stroke-width="5" stroke-linecap="round"/>
    <path d="M1066 202 l30 8 l-14 27" fill="none" stroke="#BF4B1A" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="1090" y="192" class="sans" font-size="19" fill="#BF4B1A" text-anchor="end">scores</text>
    <path d="M812 320 L1090 430" fill="none" stroke="#7B746E" stroke-width="4" stroke-linecap="round" stroke-dasharray="2 10"/>
    <path d="M1082 400 l14 27 l-30 8" fill="none" stroke="#7B746E" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="1090" y="460" class="sans" font-size="19" fill="#7B746E" text-anchor="end">learning</text>
    <circle cx="812" cy="320" r="7" fill="#1A1816"/>
  </g>

  <text x="84" y="150" class="sans" font-size="19" letter-spacing="4" fill="#7B746E">AI  +  EDUCATION</text>

  <text x="84" y="252" class="serif" font-size="66" font-weight="800" fill="#1A1816">Homework up.</text>
  <text x="84" y="327" class="serif" font-size="66" font-weight="800" fill="#BF4B1A">Learning down.</text>

  <rect x="84" y="361" width="72" height="5" rx="2.5" fill="#BF4B1A"/>
  <text x="84" y="411" class="sans" font-size="21" fill="#7B746E">Norway banned AI in elementary schools. The</text>
  <text x="84" y="441" class="sans" font-size="21" fill="#7B746E">research is more uncomfortable than the headlines.</text>
</svg>
