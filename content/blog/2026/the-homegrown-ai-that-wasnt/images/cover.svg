<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630" role="img" aria-label="Two overlapping circles, 60 and 40 percent, with a renamed tag.">
  <defs><style>
    .serif{font-family:Georgia, 'Iowan Old Style', 'Times New Roman', serif;}
    .sans{font-family:-apple-system, 'Segoe UI', Helvetica, Arial, sans-serif;}
    .mono{font-family:'Consolas', 'Courier New', monospace;}
  </style></defs>

  <rect width="1200" height="630" fill="#FAF7F2"/>
  <rect x="14" y="14" width="1172" height="602" rx="10" fill="none" stroke="#E8DDD0" stroke-width="2"/>

  <g>
    <circle cx="936" cy="316" r="70" fill="#BF4B1A" opacity="0.16" stroke="#BF4B1A" stroke-width="3"/>
    <circle cx="1026" cy="316" r="60" fill="#7B746E" opacity="0.16" stroke="#7B746E" stroke-width="3"/>
    <text x="906" y="324" class="sans" font-size="22" font-weight="800" fill="#BF4B1A" text-anchor="middle">60%</text>
    <text x="1052" y="324" class="sans" font-size="20" font-weight="800" fill="#7B746E" text-anchor="middle">40%</text>
    <g transform="rotate(-8 980 210)">
      <rect x="906" y="184" width="148" height="46" rx="6" fill="#FAF7F2" stroke="#BF4B1A" stroke-width="3"/>
      <text x="980" y="214" class="sans" font-size="20" font-weight="800" letter-spacing="3" fill="#BF4B1A" text-anchor="middle">RENAMED</text>
    </g>
  </g>

  <text x="84" y="150" class="sans" font-size="19" letter-spacing="4" fill="#7B746E">AI  SOVEREIGNTY</text>

  <text x="84" y="252" class="serif" font-size="66" font-weight="800" fill="#1A1816">The homegrown AI</text>
  <text x="84" y="327" class="serif" font-size="66" font-weight="800" fill="#BF4B1A">that wasn't.</text>

  <rect x="84" y="361" width="72" height="5" rx="2.5" fill="#BF4B1A"/>
  <text x="84" y="411" class="sans" font-size="21" fill="#7B746E">A 397B-parameter 'city model' turned out to be two</text>
  <text x="84" y="441" class="sans" font-size="21" fill="#7B746E">existing models merged, and renamed.</text>
</svg>
