<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630" role="img" aria-label="A two-sided transaction diagram: a dark box labelled merchants, marked as the side Stripe already owns, connects through a small highlighted agent node to an outlined box labelled shoppers with 440 million accounts, the side being acquired.">
  <defs>
    <style>
      .serif{font-family:Georgia, 'Iowan Old Style', 'Times New Roman', serif;}
      .sans{font-family:-apple-system, 'Segoe UI', Helvetica, Arial, sans-serif;}
    </style>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#A99E92"/>
    </marker>
  </defs>

  <rect width="1200" height="630" fill="#FAF7F2"/>
  <rect x="14" y="14" width="1172" height="602" rx="10" fill="none" stroke="#E8DDD0" stroke-width="2"/>

  <!-- right-side visual: the two ends of a transaction -->
  <g class="sans">
    <text x="940" y="196" font-size="13" letter-spacing="3" fill="#A99E92" text-anchor="middle">WHO OWNS EACH END</text>

    <!-- merchant node (owned) -->
    <rect x="712" y="238" width="168" height="96" rx="8" fill="#1A1816"/>
    <text x="796" y="282" font-size="18" font-weight="800" fill="#FAF7F2" text-anchor="middle">MERCHANTS</text>
    <text x="796" y="308" font-size="13" fill="#C9BEB0" text-anchor="middle">Stripe owns this</text>

    <!-- shopper node (the acquisition) -->
    <rect x="1000" y="238" width="168" height="96" rx="8" fill="#FAF7F2" stroke="#BF4B1A" stroke-width="3"/>
    <text x="1084" y="282" font-size="18" font-weight="800" fill="#BF4B1A" text-anchor="middle">SHOPPERS</text>
    <text x="1084" y="308" font-size="13" fill="#BF4B1A" text-anchor="middle">440M accounts</text>

    <!-- connector through the agent -->
    <line x1="1000" y1="286" x2="972" y2="286" stroke="#A99E92" stroke-width="2"/>
    <line x1="908" y1="286" x2="884" y2="286" stroke="#A99E92" stroke-width="2" marker-end="url(#arrow)"/>
    <rect x="910" y="270" width="62" height="32" rx="6" fill="#BF4B1A"/>
    <text x="941" y="291" font-size="14" font-weight="800" fill="#FAF7F2" text-anchor="middle">AGENT</text>
  </g>

  <text x="84" y="150" class="sans" font-size="19" letter-spacing="4" fill="#7B746E">PAYMENTS  STRATEGY</text>

  <text x="84" y="250" class="serif" font-size="52" font-weight="800" fill="#1A1816">Stripe won the</text>
  <text x="84" y="314" class="serif" font-size="52" font-weight="800" fill="#1A1816">merchants.</text>
  <text x="84" y="378" class="serif" font-size="52" font-weight="800" fill="#BF4B1A">Now it needs the</text>
  <text x="84" y="442" class="serif" font-size="52" font-weight="800" fill="#BF4B1A">shoppers.</text>

  <rect x="84" y="474" width="72" height="5" rx="2.5" fill="#BF4B1A"/>
  <text x="84" y="524" class="sans" font-size="21" fill="#7B746E">A $53B bid for 440 million accounts, right as</text>
  <text x="84" y="554" class="sans" font-size="21" fill="#7B746E">AI agents start doing the buying.</text>
</svg>
