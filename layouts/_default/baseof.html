<!doctype html>
<html lang="{{ .Site.LanguageCode }}">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{ if .Title }}{{ .Title }} | {{ end }}{{ .Site.Title }}</title>
    {{ with .Description }}<meta name="description" content="{{ . }}">{{ end }}
    {{ with .OutputFormats.Get "RSS" }}<link rel="alternate" type="application/rss+xml" title="{{ $.Title }}" href="{{ .RelPermalink }}">{{ end }}
  </head>
  <body>
    <header>
      <nav>
        <a href="{{ relURL "/" }}">Home</a>
        <a href="{{ relURL "/blog/" }}">Blog</a>
        <a href="{{ relURL "/newsletter/" }}">Newsletter</a>
        <a href="{{ relURL "/about/" }}">About</a>
      </nav>
    </header>
    <main>
      {{ block "main" . }}{{ end }}
    </main>
    <footer>
      {{ partial "subscribe.html" . }}
    </footer>
  </body>
</html>
