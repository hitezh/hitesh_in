baseURL = 'https://hitesh.in/'
locale   = 'en-US'
title    = 'Hitesh Sarda'
theme    = 'hitesh'

[pagination]
  pagerSize = 10

[permalinks]
  blog = ':year/:slug'

[params]
  author      = "Hitesh Sarda"
  description = "Thoughts on technology, entrepreneurship, and life."
  tagline     = "Building software that brings customers back."
  twitter     = "fullstackcto"
  linkedin    = "hiteshs"
  email       = "hitesh@optculture.com"

[taxonomies]
  category = "categories"
  tag      = "tags"
  author   = "author"

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true
  [markup.highlight]
    noClasses = false

[menu]
  [[menu.main]]
    name   = "Blog"
    url    = "/blog/"
    weight = 1
  [[menu.main]]
    name   = "Book"
    url    = "/book/"
    weight = 2
  [[menu.main]]
    name   = "AI Training"
    url    = "/ai-training/"
    weight = 3
  [[menu.main]]
    name   = "About"
    url    = "/about/"
    weight = 4
  [[menu.main]]
    name   = "Work with me"
    url    = "/work-with-me/"
    weight = 5
